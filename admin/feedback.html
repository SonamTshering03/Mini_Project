<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Feedback Review</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .feedback {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .user {
            font-weight: bold;
            color: #007BFF;
        }

        .comment {
            margin-top: 5px;
            color: #555;
        }

        .rating {
            color: gold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>User Feedback Review</h1>
        <div id="feedback-list">
            <div class="feedback">
                <div class="Number">01</div>
                <div class="rating">Rating: ★★★☆☆</div>
                <div class="comment">Food are not good.</div>
            </div>
            <div class="feedback">
                <div class="Number">02</div>
                <div class="rating">Rating: ★★★★★</div>
                <div class="comment">Responsive support team. Thank you!</div>
            </div>
            <div class="feedback">
                <div class="Number">03</div>
                <div class="rating">Rating: ★★★☆☆</div>
                <div class="comment">the quality of food need to be improve.</div>
            </div>
            <div class="feedback">
                <div class="Number">04</div>
                <div class="rating">Rating: ★★★★★</div>
                <div class="comment">not proper serving</div>
            </div>
            <div class="feedback">
                <div class="number">05</div>
                <div class="rating">Rating: ★★★★☆</div>
                <div class="comment">Great service! I had a wonderful experience.</div>
            </div>
        </div>
    </div>

</body>

</html>
