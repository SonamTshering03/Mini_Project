<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <link rel="stylesheet" href="profile_setting.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="outer-wrapper">
        <div class="profile-container">
            
            <header class="header">
                <h1 class="header-title">Profile Setting</h1>
            </header>

            <div class="profile-photo-section">
                <div class="profile-photo-circle" id="profileCircle">
                    <i class="fas fa-camera profile-camera-icon" id="cameraIcon"></i>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </div>
            </div>

            <div class="buttons-section">
                <div class="button-row">
                    <a href="../edit_name/edit_name.html" class="setting-button">Edit Name</a>
                    <a href="../phone_no/phone_no.html" class="setting-button">Edit Phone Number</a>
                </div>
                <div class="button-row">
                    <a href="../change_password/change_passwd.html" class="setting-button">Change Password</a>
                    <a href="../help/help.html" class="setting-button">Help Center</a>
                </div>
                <div class="single-button-row">
                    <button class="setting-button full-width-button">Order History</button>
                </div>
                <div class="single-button-row">
                    <button class="setting-button full-width-button">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <script src="profile_setting.js"></script>
</body>

</html>
