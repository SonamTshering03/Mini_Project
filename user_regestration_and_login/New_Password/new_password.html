<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set a New Password</title>
  <link rel="stylesheet" href="../New_Password/new_password.css">
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <img src="../New_Password/logo.png" alt="Logo" class="logo">

    <!-- Heading -->
    <h2>Set a new password</h2>
    <p class="subtitle">Create a new password. Ensure it differs from previous ones for security</p>

    <!-- Password Fields -->
    <div class="input-group">
      <input type="password" id="newPassword" placeholder="New Password">
      <span class="toggle" onclick="togglePassword('newPassword', this)"></span>
    </div>

    <div class="input-group">
      <input type="password" id="confirmPassword" placeholder="Confirm Password">
      <span class="toggle" onclick="togglePassword('confirmPassword', this)"></span>
    </div>

    <!-- Update Password Button -->
    <button class="update-btn">Update Password</button>
  </div>

  <script src="../New_Password/new_password.js"></script>
</body>
</html>
