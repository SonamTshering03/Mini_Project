<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="edit_name.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="edit_name.js"></script>

</head>
<body>

    <div class="container">
        <!-- Blue header like Profile Setting -->
        <header class="header">
            <h1 class="header-title">Edit Name</h1>
            <div class="logo-circle">
                <img src="../image/logo.png" alt="Online Food Booking System" class="logo-img">
            </div>
        </header>

        <!-- Form section -->
        <main class="content-area">
            <div class="form-container">
                <form class="edit-form">
                    <input type="text" class="text-input" placeholder="First Name">
                    <input type="text" class="text-input" placeholder="Middle Name">
                    <input type="text" class="text-input" placeholder="Last Name">
                    <input type="password" class="text-input" placeholder="Enter Password">
                    <button id="saveBtn" type="submit" class="save-button">Save Changes</button>
                    <p id="successMsg" style="display:none; color:green; font-weight:500; margin-top:10px;">Your name has been changed successfully.</p>
                    <script>
                        document.getElementById("saveBtn").addEventListener("click", function (event) {
                            event.preventDefault(); // Prevent page reload

                            const firstName = document.querySelector('input[placeholder="First Name"]').value.trim();
                            const lastName = document.querySelector('input[placeholder="Last Name"]').value.trim();
                            const password = document.querySelector('input[placeholder="Enter Password"]').value.trim();

                            // Simple validation
                            if (firstName === "" || lastName === "" || password === "") {
                                Swal.fire({
                                    title: "Error!",
                                    text: "Please enter a valid name and password.",
                                    icon: "error",
                                    confirmButtonText: "OK",
                                    confirmButtonColor: "#e5b85a",
                                    width: "420px",
                                    customClass: {
                                        popup: 'popup-rounded',
                                        title: 'swal-title',
                                        confirmButton: 'swal-confirm'
                                    }
                                });
                            } else {
                                Swal.fire({
                                    title: "Success!",
                                    text: "Your name has been changed successfully.",
                                    icon: "success",
                                    confirmButtonText: "OK",
                                    confirmButtonColor: "#e5b85a",
                                    width: "420px",
                                    customClass: {
                                        popup: 'popup-rounded',
                                        title: 'swal-title',
                                        confirmButton: 'swal-confirm'
                                    }
                                });
                            }
                        });
                    </script>

                </form>
            </div>
        </main>
    </div>

</body>
</html>
