<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="change_passwd.css">

  <!-- SweetAlert2 Library -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

  <header class="header">
    <h1>Change Password</h1>
  </header>

  <main class="main-container">
    <form class="password-form" id="passwordForm">
      <div class="input-field">
        <input type="password" id="currentPass" placeholder="Current Password" required>
        <i class="far fa-eye toggle-icon" onclick="togglePassword('currentPass', this)"></i>
      </div>

      <div class="input-field">
        <input type="password" id="newPass" placeholder="New Password" required>
        <i class="far fa-eye toggle-icon" onclick="togglePassword('newPass', this)"></i>
      </div>

      <div class="input-field">
        <input type="password" id="confirmPass" placeholder="Confirm Password" required>
        <i class="far fa-eye toggle-icon" onclick="togglePassword('confirmPass', this)"></i>
      </div>

      <button type="submit" class="save-button">Save Changes</button>
    </form>
  </main>

  <script>
    // Toggle password visibility
    function togglePassword(id, icon) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }

    // Handle Save Button Click
    document.getElementById("passwordForm").addEventListener("submit", function(e) {
      e.preventDefault(); // Prevent actual form submission

      const currentPass = document.getElementById("currentPass").value.trim();
      const newPass = document.getElementById("newPass").value.trim();
      const confirmPass = document.getElementById("confirmPass").value.trim();

      // Simple validation
      if (newPass.length < 6) {
        Swal.fire({
          icon: "error",
          title: "Error!",
          text: "Password must be at least 6 characters long.",
          confirmButtonColor: "#e5b85a"
        });
      } else if (newPass !== confirmPass) {
        Swal.fire({
          icon: "error",
          title: "Error!",
          text: "New passwords do not match.",
          confirmButtonColor: "#e5b85a"
        });
      } else {
        Swal.fire({
          icon: "success",
          title: "Success!",
          text: "Your password has been changed successfully.",
          confirmButtonColor: "#e5b85a"
        }).then(() => {
          // Optional: Clear form after success
          document.getElementById("passwordForm").reset();
        });
      }
    });
  </script>

</body>
</html>
