<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-container">
        <img src="../image/download.png" alt="Site Logo" class="logo">

        <h2>Login</h2>
        <form action="#" method="post">
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <input type="submit" value="Login">
            <a href="../../forgot_password/forgotpassword.html" class="forgot-password">Forgot password?</a>
            <button class="google-btn">Login with Google</button>
            <a href="../../sign_up/sign_up.html" class="register">Register</a>
        </form>
    </div>
</body>
</html>
